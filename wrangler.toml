# SPDX-License-Identifier: AGPL-3.0-only
#
# Cloudflare Pages configuration for sTELgano v2.
#
# Pages serves the contents of `public/` as static assets and routes
# dynamic requests through Pages Functions in `functions/`. The DO
# class lives under `src/` and is re-exported from one of the function
# files so the Pages bundler picks it up.
#
# The v1 (Phoenix/Elixir) deployment lives on `main` and is unaffected
# by anything in this file.
#
# See docs/MIGRATION.md for the broader architecture record.

name = "stelgano"
compatibility_date = "2026-04-01"
compatibility_flags = ["nodejs_compat"]
pages_build_output_dir = "./public"

# Durable Object: one instance per room_hash. Single-threaded execution
# enforces the N=1 invariant by construction. Hibernatable WebSockets
# keep idle rooms cheap.
[[durable_objects.bindings]]
name = "ROOM"
class_name = "RoomDO"

# DO migrations: introduce the RoomDO class on first deploy. SQLite-backed
# storage gives us per-room transactional state.
[[migrations]]
tag = "v1"
new_sqlite_classes = ["RoomDO"]

# D1 database: aggregate metrics + extension tokens.
# IDs are placeholders — `wrangler d1 create stelgano` produces real
# values that get pasted in here.
[[d1_databases]]
binding = "DB"
database_name = "stelgano"
database_id = "REPLACE_WITH_ID_FROM_WRANGLER_D1_CREATE"
migrations_dir = "migrations"

# Observability: Pages Functions inherit Workers Logs. Default sampling
# is 1.0 at low volumes — no third-party telemetry, keeps the
# server-blindness invariant.
[observability]
enabled = true
head_sampling_rate = 1.0

# Production environment variables. Secrets (PAYSTACK_*, ADMIN_PASSWORD)
# are set via `wrangler pages secret put`, never committed.
[vars]
PHX_HOST = "set-at-deploy-time.example"
PAYMENT_CURRENCY = "USD"
PRICE_CENTS = "200"
FREE_TTL_DAYS = "7"
PAID_TTL_DAYS = "365"
MONETIZATION_ENABLED = "false"

# Preview environment — Pages auto-creates one per non-production branch
# when connected to the GitHub repo. Vars here apply to those preview
# deploys; secrets are still set via `wrangler pages secret put --env preview`.
[env.preview.vars]
PHX_HOST = "preview.example"
MONETIZATION_ENABLED = "false"
