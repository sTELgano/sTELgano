# SPDX-License-Identifier: AGPL-3.0-only
#
# Cloudflare Workers + Assets configuration for sTELgano v2.
#
# We started this migration on Cloudflare Pages (commit bf05903 flipped
# to Pages from an initial Workers + Assets skeleton), then discovered
# Pages' file-based functions routing silently dropped the RoomDO
# export and pushed us into Pages Advanced Mode (one `_worker.ts` at
# the root — functionally identical to a Workers script). At that
# point the only thing Pages was still doing for us was the
# git-integrated build + per-branch previews; everything else (ASSETS
# binding, DOs, D1, WebSocket upgrade) is native Workers. We flipped
# back to Workers + Assets so the mental model matches what the code
# actually is, and picked up version-based rollouts / instant rollback
# as a bonus. GitHub Actions (.github/workflows/deploy.yml) replaces
# the Pages git integration.
#
# The v1 (Phoenix/Elixir) deployment lives on `main` and is unaffected
# by anything in this file.
#
# See docs/MIGRATION.md for the broader architecture record.

name = "stelgano"
main = "./_worker.ts"
compatibility_date = "2026-04-01"
compatibility_flags = ["nodejs_compat"]

# Static assets — public/ is the built output of scripts/build-html.mjs
# plus the esbuild/tailwind bundles in public/assets/. Wrangler uploads
# the whole tree on deploy.
#
# run_worker_first = true routes every request through the Worker so
# the security-headers middleware wraps static assets too. Without
# this, assets would bypass the Worker and ship with no CSP / HSTS /
# X-Frame-Options headers — defeating Phase 8's entire purpose.
[assets]
directory = "./public"
binding = "ASSETS"
run_worker_first = true

# Durable Object: one instance per room_hash. Single-threaded execution
# enforces the N=1 invariant by construction. Hibernatable WebSockets
# keep idle rooms cheap.
[[durable_objects.bindings]]
name = "ROOM"
class_name = "RoomDO"

# DO migrations: introduce the RoomDO class on first deploy. SQLite-backed
# storage gives us per-room transactional state.
[[migrations]]
tag = "v1"
new_sqlite_classes = ["RoomDO"]

# Native rate limiting — one binding per rule, limit/period are static config.
# Cheaper than a DO-per-IP approach: no extra compute, no class registration.
[[unsafe.bindings]]
name = "RATE_LIMITER_ADMIN"
type = "ratelimit"
namespace_id = "1001"
simple = { limit = 20, period = 60 }

[[unsafe.bindings]]
name = "RATE_LIMITER_WS"
type = "ratelimit"
namespace_id = "1002"
simple = { limit = 30, period = 60 }

# Caps new room creation per IP to 3 per minute. Checked inside the RoomDO
# only on first join (when !room.isInitialized), so existing-room joins
# are unaffected. Fail-open (.catch(() => success)) so a CF outage never
# blocks legitimate traffic. CF Workers Rate Limiting only supports
# period = 10 or 60 seconds — sub-minute windows are the finest granularity.
[[unsafe.bindings]]
name = "RATE_LIMITER_ROOM_CREATE"
type = "ratelimit"
namespace_id = "1003"
simple = { limit = 3, period = 60 }

# Analytics Engine — replaces the D1 country_metrics / daily_metrics
# UPSERT writes. Fire-and-forget writeDataPoint() has no row locking so
# it scales to concurrent bursts that would serialize D1 UPSERTs. Admin
# reads query this dataset via the CF GraphQL API (CF_ACCOUNT_ID +
# CF_AE_API_TOKEN secrets).
[[analytics_engine_datasets]]
binding = "ANALYTICS"
dataset = "stelgano_events"

# D1 database: extension tokens + live_counters snapshot.
[[d1_databases]]
binding = "DB"
database_name = "stelgano"
database_id = "8dc2edd6-cde2-49cb-a1bb-fffb33c6e274"
migrations_dir = "migrations"

# KV namespace for exchange rate caching. Written daily by the
# "0 6 * * *" cron via refreshRate() and read by initialize() in
# src/lib/paystack.ts when PAYSTACK_SETTLEMENT_CURRENCY ≠ PAYMENT_CURRENCY.
# Create with: wrangler kv:namespace create RATE_CACHE
[[kv_namespaces]]
binding = "RATE_CACHE"
id = "7eb3e58ecdba426e9dc583b8aff0e042"

# Cron Trigger (single daily run at 03:00 UTC):
#   Runs both maintenance tasks sequentially — token cleanup first, then
#   FX rate refresh. Consolidated from two triggers to one to stay within
#   the CF free-plan limit of 5 cron triggers per account.
[triggers]
crons = ["0 3 * * *"]

# Observability: Workers Logs, no third-party telemetry.
[observability]
enabled = true
head_sampling_rate = 1.0

# Production environment variables. Secrets (PAYSTACK_*, ADMIN_PASSWORD)
# are set via `wrangler secret put`, never committed.
[vars]
PHX_HOST = "staging.stelgano.com"
PAYMENT_CURRENCY = "USD"
PRICE_CENTS = "200"
FREE_TTL_DAYS = "7"
PAID_TTL_DAYS = "365"
MONETIZATION_ENABLED = "false"
# Cloudflare account ID — needed by the admin dashboard to query Analytics
# Engine via the GraphQL API. Not a secret: safe to commit. Get it from
# the Cloudflare dashboard URL or `wrangler whoami`.
CF_ACCOUNT_ID = "6fd5ad0d703dfa14f0e9a63ac847dab9"

# ---------------------------------------------------------------------------
# Staging environment (staging branch → stelgano-staging Worker)
#
# Resources already provisioned:
#   D1:  wrangler d1 create stelgano-staging  → f7a9b60a-0fea-43fd-94d2-66fa76ec2287
#   KV:  wrangler kv:namespace create RATE_CACHE_STAGING → 59542bfc5ca040e180b5a52fcd436b4f
#
# Secrets (set once per env, not in this file):
#   wrangler secret put ADMIN_PASSWORD --env staging
#   wrangler secret put PAYSTACK_SECRET_KEY --env staging
#   wrangler secret put PAYSTACK_PUBLIC_KEY --env staging
#   wrangler secret put PAYSTACK_CALLBACK_URL --env staging
#   wrangler secret put PAYSTACK_RECEIPT_EMAIL_DOMAIN --env staging
#   wrangler secret put CF_AE_API_TOKEN --env staging
#
# After secrets are set, push to staging — CI deploys automatically.
# ---------------------------------------------------------------------------
[env.staging]
name = "stelgano-staging"

# DO bindings are not inherited — must be repeated for each env.
[[env.staging.durable_objects.bindings]]
name = "ROOM"
class_name = "RoomDO"

# Rate limiters are not inherited — repeat all three for staging.
[[env.staging.unsafe.bindings]]
name = "RATE_LIMITER_ADMIN"
type = "ratelimit"
namespace_id = "1001"
simple = { limit = 20, period = 60 }

[[env.staging.unsafe.bindings]]
name = "RATE_LIMITER_WS"
type = "ratelimit"
namespace_id = "1002"
simple = { limit = 30, period = 60 }

[[env.staging.unsafe.bindings]]
name = "RATE_LIMITER_ROOM_CREATE"
type = "ratelimit"
namespace_id = "1003"
simple = { limit = 3, period = 60 }

# Analytics Engine not inherited — repeat for staging (shares the same dataset).
[[env.staging.analytics_engine_datasets]]
binding = "ANALYTICS"
dataset = "stelgano_events"

[[env.staging.d1_databases]]
binding = "DB"
database_name = "stelgano-staging"
database_id = "f7a9b60a-0fea-43fd-94d2-66fa76ec2287"
migrations_dir = "migrations"

[[env.staging.kv_namespaces]]
binding = "RATE_CACHE"
id = "59542bfc5ca040e180b5a52fcd436b4f"

[env.staging.vars]
PHX_HOST = "staging.stelgano.com"
PAYMENT_CURRENCY = "USD"
PRICE_CENTS = "200"
FREE_TTL_DAYS = "7"
PAID_TTL_DAYS = "365"
# Enable monetization in staging so the full paid-tier flow can be exercised.
MONETIZATION_ENABLED = "true"
CF_ACCOUNT_ID = "6fd5ad0d703dfa14f0e9a63ac847dab9"
