<!--
  title: sTELgano

  Chat page — the only interactive route. Most rendering happens in
  src/client/chat.ts; this file just establishes the container and
  loads the bundled client script.

  The title is deliberately the bare "sTELgano" (same as the
  homepage) so the browser tab reveals nothing about the current
  surface. Passcode-test rule: if the attacker reads the tab title,
  they should learn nothing about chat usage.
-->

<main id="chat-root" class="chat-container w-full flex-1 flex flex-col">
  <noscript>
    <div class="max-w-md mx-auto my-24 px-6 text-center">
      <div class="glass-card p-8 space-y-4">
        <h1 class="text-2xl font-extrabold text-white font-display">JavaScript required</h1>
        <p class="text-slate-400 text-sm leading-relaxed">
          sTELgano encrypts messages in your browser using the Web Crypto API.
          JavaScript must be enabled for any of this to work. We don't track you or
          load third-party scripts &mdash; this is the app itself.
        </p>
      </div>
    </div>
  </noscript>
</main>

<script type="module" src="/assets/chat.js"></script>
