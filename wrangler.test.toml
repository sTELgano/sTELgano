#
# Test-only wrangler config used by vitest.workers.config.ts.
#
# Mirrors wrangler.toml. The metrics queue is declared with a fast
# batch timeout so the producer → queue() consumer → daily_metrics
# path is exercised end-to-end within a test's lifetime (the DO
# emission tests poll D1 after driving the WS protocol).

name = "stelgano"
main = "./_worker.ts"
compatibility_date = "2026-04-01"
compatibility_flags = ["nodejs_compat"]

[assets]
directory = "./public"
binding = "ASSETS"

[[durable_objects.bindings]]
name = "ROOM"
class_name = "RoomDO"

[[migrations]]
tag = "v1"
new_sqlite_classes = ["RoomDO"]

[[unsafe.bindings]]
name = "RATE_LIMITER_ADMIN"
type = "ratelimit"
namespace_id = "1001"
simple = { limit = 20, period = 60 }

[[unsafe.bindings]]
name = "RATE_LIMITER_WS"
type = "ratelimit"
namespace_id = "1002"
# High limit so the many WebSocket upgrades across the test suite (the
# metric-emission tests open a socket per join) don't trip the limiter.
simple = { limit = 9999, period = 60 }

[[unsafe.bindings]]
name = "RATE_LIMITER_ROOM_CREATE"
type = "ratelimit"
namespace_id = "1003"
simple = { limit = 9999, period = 60 }

[[d1_databases]]
binding = "DB"
database_name = "stelgano"
database_id = "REPLACE_WITH_ID_FROM_WRANGLER_D1_CREATE"
migrations_dir = "migrations"

# Metrics queue — producer binding + self-consumer. Short batch timeout so
# enqueued metrics are flushed into daily_metrics quickly during tests.
[[queues.producers]]
binding = "METRICS_QUEUE"
queue = "stelgano-metrics-test"

[[queues.consumers]]
queue = "stelgano-metrics-test"
max_batch_size = 100
max_batch_timeout = 1
max_retries = 3

[vars]
HOST = "localhost"
PAYMENT_CURRENCY = "USD"
PRICE_CENTS = "200"
FREE_TTL_DAYS = "7"
PAID_TTL_DAYS = "365"
# Enable monetization so the paid-tier code paths (webhook, payment
# initiate, extension_secret join) are exercised in the test suite.
MONETIZATION_ENABLED = "true"
# Admin credentials — test-only values matching the admin.test.ts expectations.
ADMIN_USERNAME = "admin"
ADMIN_PASSWORD = "letmein"
# Paystack test credentials — must match the constants in paystack_webhook.test.ts.
PAYSTACK_SECRET_KEY = "sk_test_REPLACE_ME"
PAYSTACK_PUBLIC_KEY = "pk_test_REPLACE_ME"
PAYSTACK_CALLBACK_URL = "http://localhost:8788/payment/callback"
PAYSTACK_RECEIPT_EMAIL_DOMAIN = "localhost"
