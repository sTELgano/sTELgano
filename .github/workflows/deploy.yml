# SPDX-License-Identifier: AGPL-3.0-only
#
# Deploy pipeline for sTELgano v2 (Cloudflare Workers + Assets).
#
# Replaces Cloudflare Pages' git integration after the flip from Pages
# Advanced Mode to Workers + Assets (see docs/MIGRATION.md → "Why
# Workers + Assets").
#
# Branch behaviour:
#   v2-cloudflare → deploys to stelgano-staging (wrangler --env staging)
#   main          → deploys to stelgano (production)
#   pull_request  → test + build only, no deploy
#
# Required GitHub secrets on the repo:
#   - CLOUDFLARE_API_TOKEN   (Account → API Tokens → "Edit Cloudflare
#                             Workers" template)
#   - CLOUDFLARE_ACCOUNT_ID  (from the CF dashboard URL)
# Worker secrets set via `wrangler secret put` (staging + prod separately):
#   ADMIN_PASSWORD, PAYSTACK_SECRET_KEY, PAYSTACK_PUBLIC_KEY,
#   PAYSTACK_CALLBACK_URL, PAYSTACK_RECEIPT_EMAIL_DOMAIN, CF_AE_API_TOKEN.

name: Deploy

on:
  push:
    branches: [main, v2-cloudflare]
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: Test + build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run build:html && npm run build:csp_hashes
      - run: npm run typecheck
      - run: npm test
      - run: npm run build

  deploy-staging:
    name: Deploy to staging
    needs: test
    if: github.event_name == 'push' && github.ref == 'refs/heads/v2-cloudflare'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run build
      - name: Apply D1 migrations (staging)
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: d1 migrations apply stelgano-staging --remote --env staging
      - name: Deploy Worker (staging)
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: deploy --env staging

  deploy:
    name: Deploy to production
    needs: test
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run build
      - name: Apply D1 migrations
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: d1 migrations apply stelgano --remote
      - name: Deploy Worker
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: deploy
