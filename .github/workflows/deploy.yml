# SPDX-License-Identifier: AGPL-3.0-only
#
# Deploy pipeline for sTELgano v2 (Cloudflare Workers + Assets).
#
# Replaces Cloudflare Pages' git integration after the flip from Pages
# Advanced Mode to Workers + Assets (see docs/MIGRATION.md → "Why
# Workers + Assets"). Runs on every push to main plus manual dispatch.
# Pull requests and the v2-cloudflare branch run test + build only —
# no auto-deploy. When the v2-cloudflare branch becomes main at
# cutover, this workflow picks up the deploy job automatically.
#
# Required secrets on the repo:
#   - CLOUDFLARE_API_TOKEN   (Account → API Tokens → "Edit Cloudflare
#                             Workers" template)
#   - CLOUDFLARE_ACCOUNT_ID  (from the CF dashboard URL)
# Plus Worker secrets set via `wrangler secret put` (not in GitHub):
#   ADMIN_PASSWORD, PAYSTACK_SECRET_KEY, PAYSTACK_PUBLIC_KEY,
#   PAYSTACK_CALLBACK_URL, PAYSTACK_RECEIPT_EMAIL_DOMAIN.

name: Deploy

on:
  push:
    branches: [main, v2-cloudflare]
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: Test + build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run typecheck
      - run: npm test
      - run: npm run build

  deploy:
    name: Deploy to Cloudflare
    needs: test
    # Only deploy from main — the v2-cloudflare branch still runs the
    # test job above, but doesn't auto-ship. Flip this to also include
    # v2-cloudflare if you want preview deploys before cutover.
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run build
      - name: Apply D1 migrations
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: d1 migrations apply stelgano --remote
      - name: Deploy Worker
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: deploy
