version: 2
updates:
  # npm dependencies
  - package-ecosystem: npm
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: "06:00"
      timezone: Africa/Nairobi
    open-pull-requests-limit: 5
    labels:
      - dependencies
      - javascript
    ignore:
      # Major version bumps require manual review — they may be breaking
      - dependency-name: "*"
        update-types: ["version-update:semver-major"]

  # GitHub Actions
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: "06:00"
      timezone: Africa/Nairobi
    labels:
      - dependencies
      - github-actions
