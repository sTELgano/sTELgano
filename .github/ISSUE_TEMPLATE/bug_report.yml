name: Bug report
description: Report a bug in sTELgano
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        **Security vulnerabilities must be reported privately via security@stelgano.com — not here.**
        See [SECURITY.md](../../SECURITY.md).

  - type: textarea
    id: description
    attributes:
      label: What happened?
      description: A clear description of the bug.
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      placeholder: |
        1. Go to /chat
        2. Enter a steg number
        3. ...
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected behaviour
    validations:
      required: true

  - type: input
    id: browser
    attributes:
      label: Browser / OS
      placeholder: "Chrome 124 / macOS 14"

  - type: input
    id: version
    attributes:
      label: sTELgano version or commit
      placeholder: "v0.1.0 or abc1234"
